# NAS / offline deployment variant.
#
# Uses pre-built images only (no source build). Build the two app images on a
# host that has Docker, copy the resulting tar archives to the NAS, import
# them with `docker load -i <file>.tar`, then start the stack:
#
#   docker compose -f docker-compose-nas.yml --env-file .env up -d
#
# Build the images locally with:
#   ./build-nas-images.sh                       # linux/amd64, tag=latest
#   PLATFORM=linux/arm64 ./build-nas-images.sh  # for ARM-based NAS
#
# IMAGE_TAG selects the app image tag and must match the tag built by
# build-nas-images.sh (defaults to "latest"). Infra images (mysql/redis/rustfs)
# are still pulled from their public registries, so the NAS needs internet
# access for those — or pre-load them the same way as the app images.
#
# Note: the four `jellyfish-*` services use `pull_policy: never` so Compose
# never tries to fetch them from a registry; they must be `docker load`ed first.
# Requires Docker Compose v2.18+.

services:
  mysql:
    image: mysql:9.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30

  rustfs:
    image: rustfs/rustfs:latest
    command: ["/data"]
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
      RUSTFS_CONSOLE_ENABLE: "true"
    ports:
      - "${RUSTFS_PORT:-9000}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9001}:9001"
    volumes:
      - rustfs_data:/data

  backend-init-db:
    image: jellyfish-backend:${IMAGE_TAG:-latest}
    pull_policy: never
    environment:
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      DEBUG: "false"
      # S3 / RustFS
      S3_ENDPOINT_URL: http://rustfs:9000
      S3_REGION_NAME: us-east-1
      S3_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY}
      S3_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      # CORS
      CORS_ORIGINS: http://localhost:7788,http://127.0.0.1:7788
      # 可选
      OPENAI_API_KEY: ${OPENAI_API_KEY-}
    depends_on:
      mysql:
        condition: service_healthy
    command: ["uv", "run", "python", "init_db.py"]
    restart: "no"

  # Copies the bundled SQL scripts out of the backend image into a shared
  # volume, so mysql-init-sql can apply them without a source checkout on the
  # NAS host. The backend image already contains /app/sql (see backend.Dockerfile).
  backend-sql-seed:
    image: jellyfish-backend:${IMAGE_TAG:-latest}
    pull_policy: never
    volumes:
      - sql_scripts:/sql
    command: ["cp", "-r", "/app/sql/.", "/sql/"]
    restart: "no"

  mysql-init-sql:
    image: mysql:9.0
    depends_on:
      mysql:
        condition: service_healthy
      backend-init-db:
        condition: service_completed_successfully
      backend-sql-seed:
        condition: service_completed_successfully
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - sql_scripts:/sql:ro
    command:
      [
        "bash",
        "-lc",
        "set -e; for f in $$(find /sql -maxdepth 1 -type f -name '*.sql' | sort); do echo \"[mysql-init-sql] applying $$f\"; mysql --default-character-set=utf8mb4 -h mysql -u\"$$MYSQL_USER\" -p\"$$MYSQL_PASSWORD\" \"$$MYSQL_DATABASE\" < \"$$f\"; done",
      ]
    restart: "no"

  backend:
    image: jellyfish-backend:${IMAGE_TAG:-latest}
    pull_policy: never
    environment:
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-}
      DEBUG: "false"
      API_V1_PREFIX: /api/v1
      # S3 / RustFS
      S3_ENDPOINT_URL: http://rustfs:9000
      S3_REGION_NAME: us-east-1
      S3_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY}
      S3_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      # CORS
      CORS_ORIGINS: http://localhost:7788,http://127.0.0.1:7788
      # 可选
      OPENAI_API_KEY: ${OPENAI_API_KEY-}
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-init-db:
        condition: service_completed_successfully
      mysql-init-sql:
        condition: service_completed_successfully

  celery-worker:
    image: jellyfish-backend:${IMAGE_TAG:-latest}
    pull_policy: never
    environment:
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-}
      DEBUG: "false"
      API_V1_PREFIX: /api/v1
      S3_ENDPOINT_URL: http://rustfs:9000
      S3_REGION_NAME: us-east-1
      S3_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY}
      S3_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      CORS_ORIGINS: http://localhost:7788,http://127.0.0.1:7788
      OPENAI_API_KEY: ${OPENAI_API_KEY-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-init-db:
        condition: service_completed_successfully
      mysql-init-sql:
        condition: service_completed_successfully
    command: ["uv", "run", "celery", "-A", "app.core.celery_app:celery_app", "worker", "-l", "info"]

  front:
    image: jellyfish-front:${IMAGE_TAG:-latest}
    pull_policy: never
    environment:
      BACKEND_URL: ${BACKEND_URL}
    ports:
      - "7788:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  rustfs_data:
  sql_scripts:
